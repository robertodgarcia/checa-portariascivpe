name: Monitor BIS

on:
  schedule:
    - cron: "0 8-19 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        env:
          ANO: ${{ secrets.ANO }}
          PALAVRAS_CHAVE: ${{ secrets.PALAVRAS_CHAVE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_bis.py

      - name: Commit state
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add estado_bis.json
          git diff --cached --quiet || git commit -m "update estado bis"
          git push
